services:
  bd-pyspark-jupyter:
      image: jupyter/pyspark-notebook:spark-3.5.0
      container_name: bd-pyspark-jupyter-lab
      user: root
      ports:
          - "8888:8888"
          - "4040:4040"
      environment:
          - JUPYTER_ENABLE_LAB=yes
          - PYSPARK_PYTHON=python3
          - JUPYTER_TOKEN=bigdata2026         # Supprime l'erreur 403 (Forbidden)
          - CHOWN_HOME=yes           # Règle les droits sur les fichiers
          - CHOWN_EXTRA=/home/jovyan/work
          - GRANT_SUDO=yes           # Utile pour installer des libs en TP
      volumes:
          - spark_data:/data:rw      # Chemin unifié avec le cluster
          - .:/home/jovyan/work:rw   # Pour voir vos fichiers .ipynb locaux
      working_dir: /home/jovyan/work             # Jupyter s'ouvre directement dans le dossier data
  bd-spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: bd-spark-master
    ports:
      - "8088:8080"
      - "7077:7077"
    environment:
      - INIT_DAEMON_STEP=setup_spark
    volumes:
      - spark_data:/data:rw
  bd-spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: bd-spark-worker-1
    depends_on:
      - bd-spark-master
    ports:
      - "8081:8081"
    environment:
      - "SPARK_MASTER=spark://bd-spark-master:7077"
    volumes:
      - spark_data:/data:rw
  bd-spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: bd-spark-worker-2
    depends_on:
      - bd-spark-master
    ports:
      - "8082:8081"
    environment:
      - "SPARK_MASTER=spark://bd-spark-master:7077"
    volumes:
      - spark_data:/data:rw
  bd-spark-history-server:
      image: bde2020/spark-history-server:3.3.0-hadoop3.3
      container_name: bd-spark-history-server
      depends_on:
        - bd-spark-master
      ports:
        - "18081:18081"
      volumes:
        - /tmp/spark-events-local:/tmp/spark-events

volumes:
  spark_data:

#reseau commu entre spark et hdfs
#Pour que Spark puisse lire/écrire sur HDFS, il faut qu'ils soient sur le même réseau Docker
networks:
  default:
    name: bigdata_network
    external: true